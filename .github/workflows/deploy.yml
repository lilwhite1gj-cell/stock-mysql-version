name: 自动部署到 Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 自动更新版本号
        id: version
        run: |
          PATCH=$(git rev-list --count HEAD)
          MAJOR=1
          MINOR=1
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TODAY=$(date +%Y-%m-%d)
          # 更新 package.json 版本号
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json
          # 更新前端硬编码版本号
          sed -i "s/appVersion = '[^']*'/appVersion = '${VERSION}'/" views/index.ejs
          sed -i "s/id=\"versionBadge\">v[^<]*/id=\"versionBadge\">v${VERSION}/" views/index.ejs
          # 更新 CHANGELOG.md 最新版本日期
          sed -i "0,/## \[${VERSION}\] - .*/s//## [${VERSION}] - ${TODAY}/" CHANGELOG.md 2>/dev/null || true
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ 版本号已更新为 v${VERSION}"

      - name: 提交版本号更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json views/index.ejs CHANGELOG.md
          git diff --cached --quiet && echo "无版本变更" || git commit -m "chore: 自动更新版本号至 v${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: 部署文件到 Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            .git/**
            .github/**
            .joycode/**
            node_modules/**
            data/**
            uploads/**
            scripts/**
            .env
            .gitignore
            README.md
            start.bat
            tmp_*

      - name: 触发 Passenger 重启
        run: |
          echo "Restart at $(date -u +%Y-%m-%dT%H:%M:%SZ)" > restart.txt
      - uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./
          server-dir: /tmp/
          exclude: |
            .git/**
            .github/**
            .joycode/**
            node_modules/**
            data/**
            uploads/**
            scripts/**
            src/**
            views/**
            public/**
            package*.json
            CHANGELOG.md
            .env
            .gitignore
            README.md
            start.bat